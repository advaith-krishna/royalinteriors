<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Admin</title>
</head>
<body>
  <main>
    <h1>Project Admin</h1>

    <form id="project-form">
      <p>
        <label for="title">Project title</label><br>
        <input id="title" name="title" type="text" required autocomplete="off">
      </p>

      <p>
        <label for="images">Images</label><br>
        <input id="images" name="images" type="file" accept="image/*" multiple required>
      </p>

      <button type="submit">Upload</button>
    </form>

    <p id="status" role="status" aria-live="polite"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.40.0"></script>
  <script>
    const SUPABASE_URL = 'https://gecsgdoiraviqdoqwbov.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlY3NnZG9pcmF2aXFkb3F3Ym92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTA4OTAsImV4cCI6MjA5NTA4Njg5MH0.gGMiSp1vaUNaupYDVUp6bHgC9z1WONmIQjl4raolyAM';
    const BUCKET = 'projects';
    const MAX_FILE_BYTES = 10 * 1024 * 1024;

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const form = document.getElementById('project-form');
    const status = document.getElementById('status');

    const setStatus = message => {
      status.textContent = message;
    };

    const safeName = name =>
      name.toLowerCase().replace(/[^a-z0-9._-]+/g, '-').replace(/^-+|-+$/g, '');

    async function uploadImages(files) {
      const urls = [];

      for (const file of files) {
        if (!file.type.startsWith('image/')) throw new Error(`${file.name} is not an image.`);
        if (file.size > MAX_FILE_BYTES) throw new Error(`${file.name} is larger than 10 MB.`);

        const path = `${Date.now()}-${crypto.randomUUID()}-${safeName(file.name)}`;
        const { data: uploadData, error: uploadError } = await client.storage
          .from(BUCKET)
          .upload(path, file, { contentType: file.type, upsert: false });

        if (uploadError) throw uploadError;

        const { data } = client.storage.from(BUCKET).getPublicUrl(uploadData.path);
        if (!data.publicUrl) throw new Error(`Could not create public URL for ${file.name}.`);
        urls.push(data.publicUrl);
      }

      return urls;
    }

    async function saveProject(title, newUrls) {
      const { data: existing, error: selectError } = await client
        .from('projects')
        .select('id,images')
        .eq('title', title)
        .order('id', { ascending: false })
        .limit(1)
        .maybeSingle();

      if (selectError) throw selectError;

      if (!existing) {
        const { error: insertError } = await client
          .from('projects')
          .insert({ title, images: newUrls });

        if (insertError) throw insertError;
        return;
      }

      const images = Array.isArray(existing.images) ? existing.images : [];
      const { error: updateError } = await client
        .from('projects')
        .update({ images: [...images, ...newUrls] })
        .eq('id', existing.id);

      if (updateError) throw updateError;
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const submitButton = form.querySelector('button[type="submit"]');
      const title = form.title.value.trim();
      const files = [...form.images.files];

      if (!title || files.length === 0) return;

      submitButton.disabled = true;
      setStatus('Uploading...');

      try {
        const urls = await uploadImages(files);
        await saveProject(title, urls);
        form.reset();
        setStatus(`Saved ${urls.length} image${urls.length === 1 ? '' : 's'}.`);
      } catch (error) {
        setStatus(error.message || 'Upload failed.');
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
